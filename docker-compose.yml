services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=bf6_stats
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=bf6_stats_dev_secret_key_2024
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=bf6_stats
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bf6_stats"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
